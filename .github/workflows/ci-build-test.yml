name: "CI — Build, Security & Tests"

# Déclenché sur push et pull request
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  PHP_VERSION: '8.4'
  DATABASE_URL: "mysql://demo_user:demo_password@127.0.0.1:3306/demo_test?serverVersion=8.0&charset=utf8mb4"

jobs:

  # ── ÉTAPE 1 : BUILD ─────────────────────────────────────────────────────────
  build:
    name: "1 — Build"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_mysql, intl, zip, opcache
          tools: composer:v2
          coverage: xdebug

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-scripts

      - name: Clear Symfony cache
        run: php bin/console cache:clear --env=test

      - name: Cache vendor
        uses: actions/cache@v4
        with:
          path: vendor
          key: vendor-${{ hashFiles('composer.lock') }}

  # ── ÉTAPE 2 : SECURITY SCAN — shift-left ────────────────────────────────────
  # SonarQube avant les tests : principe DevSecOps shift-left
  # Détecte la dette technique et les vulnérabilités dès le build
  security-scan:
    name: "2 — Security Scan (SonarQube)"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Run SonarQube static analysis
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://demo-sonarcube.dev.fabdevlab.fr
        with:
          args: >
            -Dsonar.projectKey=Demo-symfony
            -Dsonar.sources=src
            -Dsonar.tests=tests

  # ── ÉTAPE 3 : TESTS UNITAIRES ───────────────────────────────────────────────
  # Logique métier pure, sans BDD
  # Cible : RecommendationService
  test-unit:
    name: "3 — Unit Tests"
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_mysql, intl, zip, opcache
          tools: composer:v2
          coverage: xdebug

      - name: Restore vendor cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: vendor-${{ hashFiles('composer.lock') }}

      - name: Run unit tests
        run: php vendor/bin/phpunit --testsuite=unit --testdox

  # ── ÉTAPE 4 : TESTS FONCTIONNELS ────────────────────────────────────────────
  # Avec BDD MySQL éphémère — flux JWT complet
  # Génère coverage.xml → mis à jour dans SonarQube
  test-functional:
    name: "4 — Functional Tests (JWT / API)"
    runs-on: ubuntu-latest
    needs: test-unit

    env:
      JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
      JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}
      JWT_PASSPHRASE: ${{ secrets.JWT_PASSPHRASE }}

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: demo_test
          MYSQL_USER: demo_user
          MYSQL_PASSWORD: demo_password
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: pdo_mysql, intl, zip, opcache
          tools: composer:v2
          coverage: xdebug

      - name: Restore vendor cache
        uses: actions/cache@v4
        with:
          path: vendor
          key: vendor-${{ hashFiles('composer.lock') }}

      - name: Run database migrations
        run: php bin/console doctrine:migrations:migrate --no-interaction --env=test

      - name: Load fixtures
        run: php bin/console doctrine:fixtures:load --no-interaction --env=test

      - name: Run functional tests with coverage
        run: |
          php vendor/bin/phpunit \
            --testsuite=functional \
            --testdox \
            --coverage-clover coverage.xml \
            --log-junit test-report.xml

      - name: Update SonarQube with coverage
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://demo-sonarcube.dev.fabdevlab.fr
        with:
          args: >
            -Dsonar.projectKey=Demo-symfony
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.php.coverage.reportPaths=coverage.xml
            -Dsonar.php.tests.reportPath=test-report.xml