name: "CD — Deploy Production"

# Déclenché uniquement si les E2E sur preprod sont verts
# Garantit que rien n'arrive en prod sans validation complète
on:
  workflow_run:
    workflows: ["CI — E2E Tests (Playwright)"]
    types: [completed]

jobs:
  deploy-prod:
    name: "Deploy → Production (Coolify)"
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Trigger Coolify Production deployment
        run: |
          curl -X GET "${{ secrets.COOLIFY_WEBHOOK_PROD }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN_PROD }}" \
            --fail \
            --silent \
            --show-error