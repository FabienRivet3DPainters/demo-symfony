name: "CI — Deploy to Coolify"

# Déclenché uniquement quand "CI — E2E Tests (Playwright)" est terminé avec succès
# Garantit que le déploiement n'arrive qu'après validation complète
on:
  workflow_run:
    workflows: ["CI — E2E Tests (Playwright)"]
    types: [completed]
    branches: [main, master]

jobs:

  # ── ÉTAPE 6 : DÉPLOIEMENT ───────────────────────────────────────────────────
  # Webhook Coolify déclenché uniquement si tous les tests E2E sont verts
  # Principe DevSecOps : zéro déploiement de code non validé
  deploy:
    name: "6 — Deploy to Coolify"
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Trigger Coolify deployment via webhook
        run: |
          curl -X GET "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            --fail \
            --silent \
            --show-error
        env:
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}