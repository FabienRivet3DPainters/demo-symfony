name: "CI — Load Tests (K6)"

# Déclenché uniquement après un déploiement Coolify réussi
# Les tests de charge s'exécutent sur l'app en production, pas en local
on:
  workflow_run:
    workflows: ["CI — Deploy to Coolify"]
    types: [completed]
    branches: [main, master]

jobs:

  # ── ÉTAPE 7 : TESTS DE CHARGE ────────────────────────────────────────────────
  # K6 simule une montée en charge sur l'app déployée
  # Résultats envoyés sur Grafana Cloud pour visualisation
  # continue-on-error : un dépassement de seuil génère un rapport mais ne bloque pas
  load-test:
    name: "7 — Load Tests (K6)"
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install K6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring \
            --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
            --keyserver hkp://keyserver.ubuntu.com:80 \
            --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6 -y

      # Les seuils sont définis dans le script K6 lui-même (p95 < 200ms, error rate < 1%)
      # Les résultats sont envoyés sur Grafana Cloud via K6_CLOUD_TOKEN
      - name: Run K6 load test
        run: k6 run k6/load-test.js
        env:
          BASE_URL: ${{ secrets.E2E_BASE_URL }}
          K6_USERNAME: ${{ secrets.E2E_USER_EMAIL }}
          K6_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}