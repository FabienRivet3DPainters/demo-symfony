name: CI Symfony

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DEFAULT_URI: http://localhost  # évite l'erreur cache:clear
      DATABASE_URL: mysql://root:${{ secrets.MYSQL_PASSWORD }}@localhost:3306/demo?serverVersion=8.0

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql, intl, zip

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run unit tests
        run: php bin/phpunit tests/service/RecommendationServiceTest.php

      - name: Run SonarQube scan
        uses: sonarsource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=Demo-symfony
            -Dsonar.sources=.
            -Dsonar.host.url=http://localhost:9000
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}

            