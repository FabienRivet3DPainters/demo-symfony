name: CI Symfony

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      APP_ENV: test
      DATABASE_URL: mysql://root:${{ secrets.MYSQL_PASSWORD }}@127.0.0.1:3306/demo?serverVersion=8.0

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DATABASE: demo
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql, intl, zip

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run migrations
        run: php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration

      - name: Run unit tests
        run: php bin/phpunit tests/service/RecommendationServiceTest.php

      - name: Run SonarQube scan
        uses: sonarsource/sonarcloud-github-action@v2
        with:
          args: >
            -Dsonar.projectKey=Demo-symfony
            -Dsonar.sources=.
            -Dsonar.host.url=https://demo-sonarcube.dev.fabdevlab.fr
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}