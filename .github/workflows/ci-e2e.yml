name: "CI — E2E Tests (Playwright)"

# Déclenché uniquement quand "CI — Build, Security & Tests" est terminé avec succès
# sur la branche main — jamais sur les pull requests
on:
  workflow_run:
    workflows: ["CI — Build, Security & Tests"]
    types: [completed]
    branches: [main, master]

jobs:

  # ── ÉTAPE 5 : TESTS END-TO-END ──────────────────────────────────────────────
  # Tests navigateur Playwright sur l'app déployée sur Coolify
  # Se déclenche uniquement si le workflow CI précédent a réussi
  test-e2e:
    name: "5 — E2E Tests (Playwright)"
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30