name: "CI — E2E Tests (Playwright)"

# Déclenché après déploiement preprod réussi
# Les E2E testent la PREPROD, pas la prod
on:
  workflow_run:
    workflows: ["CD — Deploy Preprod"]
    types: [completed]
    branches: [main, master]

jobs:
  test-e2e:
    name: "5 — E2E Tests (Playwright sur Preprod)"
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # BASE_URL pointe sur la PREPROD
      - name: Run Playwright tests
        run: npx playwright test
        env:
          BASE_URL: https://preprod-nginix.dev.fabdevlab.fr
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30