version: "3.9"

services:
  php:
    build:
      context: .
    container_name: symfony
    working_dir: /var/www/symfony
    environment:
      - APP_ENV=${APP_ENV}
      - APP_SECRET=${APP_SECRET}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}
      - JWT_PASSPHRASE=${JWT_PASSPHRASE}
    volumes:
      - ./:/var/www/symfony:delegated
    restart: unless-stopped
    depends_on:
      - mysql
    networks:
      - proxy

  nginx:
    image: nginx:alpine
    container_name: demo_symfony_nginx
    depends_on:
      - php
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.demo-symfony.rule=Host(`demo-symfony.dev.fabdevlab.fr`)"
      - "traefik.http.routers.demo-symfony.entrypoints=websecure"
      - "traefik.http.routers.demo-symfony.tls=true"
      - "traefik.http.routers.demo-symfony.tls.certresolver=letsencrypt"
      - "traefik.http.services.demo-symfony.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy"   
    networks:
      - proxy
    volumes:
      - ./:/var/www/symfony:ro,delegated
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - demo_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password     
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER}", "-p${MYSQL_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - proxy

  phpmyadmin:
    image: phpmyadmin
    container_name: phpmyadmin
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
      - PMA_USER=${MYSQL_USER}
      - PMA_PASSWORD=${MYSQL_PASSWORD}
    depends_on:
      - mysql
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.phpmyadmindemo.rule=Host(`phpmyadmindemo.dev.fabdevlab.fr`)"
      - "traefik.http.routers.phpmyadmindemo.entrypoints=websecure"
      - "traefik.http.routers.phpmyadmindemo.tls=true"
      - "traefik.http.routers.phpmyadmindemo.tls.certresolver=letsencrypt"
      - "traefik.http.services.phpmyadmindemo.loadbalancer.server.port=80"
      - "traefik.docker.network=proxy"   
    networks:
      - proxy
  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarcube.rule=Host(`sonarcube.dev.fabdevlab.fr`)"
      - "traefik.http.routers.sonarcube.entrypoints=websecure"
      - "traefik.http.routers.sonarcube.tls=true"
      - "traefik.http.routers.sonarcube.tls.certresolver=letsencrypt"
      - "traefik.http.services.sonarcube.loadbalancer.server.port=9000"
      - "traefik.docker.network=proxy"   
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    restart: unless-stopped
    networks:
      - proxy
      

volumes:
  demo_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
networks:
  proxy:
    external: true



