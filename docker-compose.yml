services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/symfony
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET:-your-secret-placeholder}
      DATABASE_URL: "mysql://${MYSQL_USER:-demo_user}:${MYSQL_PASSWORD:-demo_password}@mysql:3306/${MYSQL_DATABASE:-demo}?serverVersion=8.0&charset=utf8mb4"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-%kernel.project_dir%/config/jwt/private.pem}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-%kernel.project_dir%/config/jwt/public.pem}
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-your-passphrase-placeholder}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: nginx/ssl/Dockerfile
    depends_on:
      - php
    ports:
      - "80"
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword-placeholder}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-demo}
      MYSQL_USER: ${MYSQL_USER:-demo_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-demo_password}
    volumes:
      - demo_data:/var/lib/mysql
    command: --authentication-policy=caching_sha2_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${MYSQL_USER:-demo}
      PMA_PASSWORD: ${MYSQL_PASSWORD:-demo_password}
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "80"
    restart: unless-stopped

  sonarqube:
    image: sonarqube:community
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    ports:
      - "9000"
    restart: unless-stopped

volumes:
  demo_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions: