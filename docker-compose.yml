version: "3.9"

services:
  php:
    build:
      context: .
    container_name: symfony
    working_dir: /var/www/symfony
    environment:
      - APP_ENV=dev
      - APP_SECRET=34a1be6a7ab09cb639b66554513417e6
      - DATABASE_URL=mysql://root:root123456@mysql:3306/demo?serverVersion=8.0
      - JWT_SECRET_KEY=/var/www/symfony/config/jwt/private.pem
      - JWT_PUBLIC_KEY=/var/www/symfony/config/jwt/public.pem
      - JWT_PASSPHRASE=e1027461bd610a8b67427614e84301004838ad49c210766dfdcdac694c965b19
    volumes:
      - ./:/var/www/symfony:delegated
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: demo_symfony_nginx
    depends_on:
      - php
      - phpmyadmin
    ports:
      - "8080:80"      # Symfony HTTP
      - "8443:443"     # Symfony HTTPS
      - "8444:8444"    # PhpMyAdmin HTTPS via Nginx
    volumes:
      - ./:/var/www/symfony:ro,delegated
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root123456
      - MYSQL_DATABASE=demo
    ports:
      - "3307:3306"
    volumes:
      - demo_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123456"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin
    container_name: phpmyadmin
    environment:
      - PMA_HOST=mysql
      - PMA_PORT=3306
      - PMA_USER=root
      - PMA_PASSWORD=root123456
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    restart: unless-stopped

volumes:
  demo_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions: