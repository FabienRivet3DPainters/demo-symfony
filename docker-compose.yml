version: "3.8"

services:

  php:
    build:
      context: .
    container_name: symfony
    working_dir: /var/www/symfony
    environment:
      - APP_ENV=dev
      - APP_SECRET=${APP_SECRET}
      - DATABASE_URL=${DATABASE_URL}
    volumes:
      - ./:/var/www/symfony:delegated
    restart: unless-stopped
    depends_on:
      - mysql

  nginx:
    image: nginx:alpine
    container_name: demo_symfony_nginx
    depends_on:
      - php
    ports:
      - "8080:80"
    volumes:
       - ./:/var/www/symfony:ro,delegated
       - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
    ports:
      - "3307:3306"
    volumes:
      - demo_data:/var/lib/mysql
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin
    container_name: phpmyadmin
    environment:
      - PMA_HOST=${PMA_HOST}
      - PMA_PORT=${PMA_PORT}
    ports:
      - "8888:80"
    depends_on:
      - mysql
    restart: unless-stopped

volumes:
  demo_data: